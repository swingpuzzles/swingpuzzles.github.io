<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon.js with Vite</title>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    
    <!-- Microsoft Clarity -->
    <!-- Replace YOUR_PROJECT_ID with your actual Clarity Project ID -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "YOUR_PROJECT_ID");
    </script>
    
    <!-- Google Analytics 4 (backup/alternative) -->
    <!-- Replace G-XXXXXXXXXX with your actual Measurement ID -->
    <!--
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX', {
            anonymize_ip: true,
            cookie_flags: 'SameSite=None;Secure'
        });
    </script>
    -->
</head>
<body>
    <script type="module" src="/index.ts"></script>
    <div id="loadingOverlay" style="
        position: absolute;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.5); /* semi-transparent black */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
    ">
        <img src="assets/misc/wait-anim.webp" style="width: 200px; height: 200px;" />
    </div>
    <!-- Cookie Consent -->
    <div id="cookie-consent" style="position: fixed; bottom: 0; width: 100%; background: #333; color: white; padding: 10px; z-index: 1000; text-align: center; display: none;">
        This site uses cookies to improve your experience.
        <button id="acceptCookies">Accept</button>
    </div>

    <!-- Fullscreen Required Dialog -->
    <div id="fullscreen-required-dialog" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000c; color: white; z-index: 1001; align-items: center; justify-content: center; flex-direction: column;">
        <p id="fullscreen-dialog-text" style="font-size: 20px; margin-bottom: 1em;">This game requires fullscreen. Tap below to continue.</p>
        <button id="enterFullscreenBtn">Enter Fullscreen</button>
    </div>

    <!-- Exit Fullscreen Button -->
    <button id="exitFullscreenBtn" style="position: absolute; top: 10px; left: 10px; z-index: 1002; display: none;">
        Exit Fullscreen
    </button>
</body>
</html>
